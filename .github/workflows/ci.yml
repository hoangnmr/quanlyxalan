name: quality-gate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - run: python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - run: python -m compileall -q backend
      - run: python -m pytest -q
        env:
          TEST_DATABASE_URL: sqlite:///ci-test.db
          SECRET_KEY: ci-only-not-for-runtime
      - run: git diff --check
      - name: Secret pattern guard
        shell: pwsh
        run: |
          if (git grep -n -E '(AKIA[0-9A-Z]{16}|BEGIN (RSA |EC )?PRIVATE KEY)' -- ':!templates/*') { exit 1 }
