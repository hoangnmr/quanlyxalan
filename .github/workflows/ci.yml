name: quality-gate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - run: python -m compileall -q backend
      - run: python -m pytest -q
        env:
          TEST_ADMIN_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/postgres
          SECRET_KEY: ci-only-not-for-runtime
      - run: git diff --check
      - name: Secret pattern guard
        run: |
          set +e
          findings=$(git grep -n -E '(AKIA[0-9A-Z]{16}|BEGIN (RSA |EC )?PRIVATE KEY)' -- ':!templates/*')
          grep_exit=$?
          set -e
          if [ "$grep_exit" -gt 1 ]; then
            echo "Secret scan failed to run (git grep exit $grep_exit)." >&2
            exit "$grep_exit"
          fi
          if [ -n "$findings" ]; then
            echo "$findings"
            echo 'Potential secret material found.' >&2
            exit 1
          fi
          echo 'Secret pattern guard passed.'
